# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - ProjetoEngSoftModuloRelatorios

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      # 🛠️ Local Build Section
      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m venv $HOME/antenv
          source $HOME/antenv/bin/activate
          pip install -r requirements.txt

      - name: Install frontend dependencies
        run: |
          npm ci

      - name: Build frontend assets
        run: |
          npm run build

      - name: Prepare static assets for deployment
        run: |
          mkdir -p static
          cp -R dist/* static/

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read # Reduzido apenas para leitura do repositório, já que não precisamos mais gerar JWT para o login OIDC

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      # 🔄 O passo "Login to Azure" foi removido daqui porque o Perfil de Publicação faz a autenticação direto no passo abaixo!

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }} # 🌟 Chave adicionada para usar o token estudantil
          slot-name: 'Production'
          package: '.'